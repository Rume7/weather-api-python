name: Test, Bump, and Tag

on:
  push:
    branches:
      - main

jobs:
  quality-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # 1. Manual Checkout (Replaces actions/checkout)
      - name: Manual Git Checkout
        run: |
          git init .
          git remote add origin https://github.com
          git fetch --depth=1 origin $GITHUB_SHA
          git checkout FETCH_HEAD

      # 2. Use System Python (Replaces actions/setup-python)
      - name: Install dependencies
        run: |
          python3 -m pip install --user pytest requests python-semantic-release
          python3 -m pip install -e .

      # 3. Policy: Run Tests
      - name: Run Tests
        run: python3 -m pytest

      # 4. Versioning & Tagging
      - name: Bump Version and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Using the installed semantic-release tool directly
          python3 -m semantic_release version
          git push --follow-tags origin main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
